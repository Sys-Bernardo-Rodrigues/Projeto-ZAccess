services:
  # ============================================
  # MongoDB - Banco de dados principal
  # ============================================
  mongodb:
    image: mongo:7
    container_name: zaccess-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo-data:/data/db
      - ./server/scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - zaccess-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache e PubSub em tempo real
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: zaccess-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - zaccess-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  zaccess-network:
    driver: bridge
